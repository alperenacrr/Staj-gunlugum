<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staj Günlüğüm | Sayfa 2</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="theme-switch-wrapper">
        <label class="theme-switch" for="checkbox">
            <input type="checkbox" id="checkbox" />
            <div class="slider round"></div>
        </label>
        <em style="margin-left: 10px; font-size: 0.9em; color: #333;">Karanlık Mod</em>
    </div>

    <header>
        <img src="resimler/profil.jpg?v=2" alt="Profil Fotoğrafım" class="profil-resmi">
        <h1>Alperen Acar</h1>
        <p>IMECAR Stajyeri</p>
    </header>

    <section id="staj-gunlugu">
        <h2>Staj Günlüğüm (Sayfa 2)</h2>

        <div class="gunluk-kart">
            <h3>6. Gün:</h3>
            <p><strong>Tarih:</strong> 16 Şubat Pazartesi 2026</p>
            <p>İçerik buraya...</p>
        </div>
        
        <div class="pagination">
            <a href="index.html">1</a>
            <a href="sayfa2.html" class="active">2</a>
            <a href="sayfa3.html">3</a>
        </div>
    </section>

    <script>
        // --- DARK MODE JAVASCRIPT (TÜM SAYFALAR İÇİN) ---
        const toggleSwitch = document.querySelector('.theme-switch input[type="checkbox"]');
        const currentTheme = localStorage.getItem('theme');

        if (currentTheme) {
            document.body.classList.add(currentTheme);
            if (currentTheme === 'dark-mode') {
                toggleSwitch.checked = true;
            }
        }

        function switchTheme(e) {
            if (e.target.checked) {
                document.body.classList.add('dark-mode');
                localStorage.setItem('theme', 'dark-mode');
            } else {
                document.body.classList.remove('dark-mode');
                localStorage.setItem('theme', 'light-mode');
            }
        }

        toggleSwitch.addEventListener('change', switchTheme, false);
        // --------------------------------------------
    </script>
</body>
</html>
